<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Админка — Навигатор сделки СПН</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <h1>Админка / сотрудники и роли</h1>
        <p>Настройка ролей, команд, руководителей и активности сотрудников.</p>
        <div id="pageStatus" class="status">Загрузка...</div>
      </div>
      <div class="actions">
        <a class="button light" href="./deals.html">Сделки</a>
        <a class="button light" href="./index.html">Навигатор</a>
        <button id="btnLogout" class="light">Выйти</button>
      </div>
    </header>

    <section id="authBox" class="panel" style="display:none">
      <h2>Вход администратора</h2>
      <div class="row">
        <label>Email<input id="email" type="email" autocomplete="username"></label>
        <label>Пароль<input id="password" type="password" autocomplete="current-password"></label>
      </div>
      <button id="btnLogin" class="green">Войти</button>
      <p class="small">Доступ к этому разделу есть только у профиля с ролью admin.</p>
    </section>

    <main id="adminBox" class="grid" style="display:none">
      <aside class="panel left">
        <div id="adminInfo"></div>
        <div id="filters" class="section"></div>
      </aside>
      <section class="panel result">
        <div id="stats"></div>
        <div id="profilesTable"></div>
      </section>
    </main>
  </div>
  <script type="module" src="./assets/js/pages/admin.js"></script>
</body>
</html>
