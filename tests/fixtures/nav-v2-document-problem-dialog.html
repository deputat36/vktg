<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/nav-v2.css?v=20260701-0830">
  <title>Navigator v2 document problem dialog fixture</title>
</head>
<body class="nav-v2">
  <main id="app" class="nav-v2-shell mobile-first-screen-card">
    <section class="hero"><h1>Карточка сделки</h1></section>
    <div id="pageStatus" class="status" role="status" aria-live="polite">Готово к действию.</div>
    <section class="card">
      <h2>Документы</h2>
      <div class="list">
        <div class="list-item">
          <div class="doc-status"><div><b>Выписка ЕГРН</b></div><span class="pill yellow">получен</span></div>
          <div class="actions">
            <button id="documentProblem" class="btn red" data-doc-id="doc-1" data-doc-status="problem" type="button">Проблема</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    localStorage.setItem('nav_session_v2', JSON.stringify({
      access_token: 'fixture-access-token',
      refresh_token: 'fixture-refresh-token',
      user: { id: 'fixture-user', email: 'fixture@example.test' }
    }));
  </script>
  <script type="module">
    import { applyDealCardDocumentProblemDialog } from '/assets/js/nav-v2/deal-card-document-problem-dialog-v2.js?v=20260715-01';

    const demo = new URLSearchParams(location.search).get('demo') === '1';
    const data = {
      deal: demo ? { title: 'ДЕМО: Карточка сделки' } : { title: 'Карточка сделки' },
      documents: [{ id: 'doc-1', title: 'Выписка ЕГРН' }]
    };
    applyDealCardDocumentProblemDialog(data);
    window.applyDocumentProblemDialog = () => applyDealCardDocumentProblemDialog(data);
  </script>
</body>
</html>
