name: Navigator v2 preview bundle assembler v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-preview-bundle-assembler-v1.json'
      - 'config/nav-v2-preview-deployment-bundle-manifest-v1.json'
      - 'config/nav-v2-intake-contract-v1.json'
      - 'scripts/assemble-nav-v2-preview-bundle-v1.mjs'
      - 'scripts/run-nav-v2-preview-bundle-segment-v1.sh'
      - 'scripts/check_nav_v2_preview_bundle_assembler_v1.py'
      - 'scripts/check-nav-v2-preview-bundle-artifacts-v1.mjs'
      - 'supabase/prototypes/nav_v2_*.sql'
      - 'tests/sql/nav_v2_privacy_aligned_quality_*.sql'
      - 'tests/sql/nav_v2_bounded_task_*.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_*.sql'
      - 'tests/sql/nav_v2_intake_*.sql'
      - 'tests/sql/nav_v2_governed_intake_*.sql'
      - 'tests/sql/nav_v2_preview_bundle_*.sql'
      - '.github/workflows/nav-v2-preview-bundle-assembler-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-preview-bundle-assembler-v1.json'
      - 'scripts/assemble-nav-v2-preview-bundle-v1.mjs'
      - 'scripts/run-nav-v2-preview-bundle-segment-v1.sh'
      - 'scripts/check_nav_v2_preview_bundle_assembler_v1.py'
      - 'scripts/check-nav-v2-preview-bundle-artifacts-v1.mjs'
      - 'tests/sql/nav_v2_preview_bundle_*.sql'
      - '.github/workflows/nav-v2-preview-bundle-assembler-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-assembly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate assembler source contract
        run: python3 scripts/check_nav_v2_preview_bundle_assembler_v1.py
      - name: Compile source checker
        run: python3 -m py_compile scripts/check_nav_v2_preview_bundle_assembler_v1.py
      - name: Check segment runner syntax
        run: bash -n scripts/run-nav-v2-preview-bundle-segment-v1.sh
      - name: Assemble twice into temporary directories
        run: |
          node scripts/assemble-nav-v2-preview-bundle-v1.mjs --output-dir /tmp/nav-v2-bundle-a
          node scripts/assemble-nav-v2-preview-bundle-v1.mjs --output-dir /tmp/nav-v2-bundle-b
      - name: Prove byte-identical deterministic output
        run: diff -ru /tmp/nav-v2-bundle-a /tmp/nav-v2-bundle-b
      - name: Verify artifact hashes, source order and rehearsal boundaries
        run: |
          node scripts/check-nav-v2-preview-bundle-artifacts-v1.mjs --bundle-dir /tmp/nav-v2-bundle-a
          node scripts/check-nav-v2-preview-bundle-artifacts-v1.mjs --bundle-dir /tmp/nav-v2-bundle-b
      - name: Prove no generated output entered the repository
        run: |
          test ! -e generated/nav_v2_intake_save_adapter_v1.sql
          if find supabase/migrations -maxdepth 1 -type f -iname '*preview*bundle*' | grep -q .; then
            echo 'FAIL: CI-only bundle leaked into migrations'
            exit 1
          fi
      - name: Upload deterministic rehearsal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-preview-bundle-rehearsal-v1
          path: /tmp/nav-v2-bundle-a
          if-no-files-found: error
          retention-days: 14

  postgres-17-segment-lifecycle:
    needs: deterministic-assembly
    strategy:
      fail-fast: false
      matrix:
        segment: [quality, bounded_core, bounded_dto, intake]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_bundle
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_bundle"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_bundle
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Run isolated assembled segment lifecycle
        run: bash scripts/run-nav-v2-preview-bundle-segment-v1.sh '${{ matrix.segment }}'
      - name: Upload segment diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-preview-bundle-${{ matrix.segment }}-log
          path: /tmp/nav-v2-preview-bundle-${{ matrix.segment }}.log
          if-no-files-found: warn
          retention-days: 14
