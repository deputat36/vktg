name: Navigator v2 task Edge identity gate

on:
  pull_request:
    paths:
      - 'config/nav-v2-task-edge-identity-contract.json'
      - 'supabase/functions/nav-v2-deal-api/task-action-edge-identity-v2.js'
      - 'supabase/functions/nav-v2-deal-api/task-action-contract-v2.js'
      - 'supabase/functions/nav-v2-deal-api/index.ts'
      - 'supabase/prototypes/nav_v2_bounded_task_mutations.sql'
      - 'fixtures/nav-v2-task-edge-identity-scenarios.json'
      - 'scripts/check-nav-v2-task-edge-identity.mjs'
      - 'scripts/check_nav_v2_task_edge_identity.py'
      - 'tests/sql/nav_v2_task_edge_identity_setup.sql'
      - 'tests/sql/nav_v2_task_edge_identity_assertions.sql'
      - 'docs/NAV_V2_TASK_EDGE_IDENTITY_GATE_2026-07-17.md'
      - '.github/workflows/nav-v2-task-edge-identity.yml'
  push:
    branches:
      - main
    paths:
      - 'config/nav-v2-task-edge-identity-contract.json'
      - 'supabase/functions/nav-v2-deal-api/task-action-edge-identity-v2.js'
      - 'supabase/functions/nav-v2-deal-api/task-action-contract-v2.js'
      - 'supabase/functions/nav-v2-deal-api/index.ts'
      - 'supabase/prototypes/nav_v2_bounded_task_mutations.sql'
      - 'fixtures/nav-v2-task-edge-identity-scenarios.json'
      - 'scripts/check-nav-v2-task-edge-identity.mjs'
      - 'scripts/check_nav_v2_task_edge_identity.py'
      - 'tests/sql/nav_v2_task_edge_identity_setup.sql'
      - 'tests/sql/nav_v2_task_edge_identity_assertions.sql'
      - 'docs/NAV_V2_TASK_EDGE_IDENTITY_GATE_2026-07-17.md'
      - '.github/workflows/nav-v2-task-edge-identity.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  identity-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate identity source contract
        run: python3 scripts/check_nav_v2_task_edge_identity.py
      - name: Compile identity checker
        run: python3 -m py_compile scripts/check_nav_v2_task_edge_identity.py
      - name: Check JavaScript syntax
        run: |
          node --check supabase/functions/nav-v2-deal-api/task-action-edge-identity-v2.js
          node --check scripts/check-nav-v2-task-edge-identity.mjs
      - name: Run actor-injection semantic matrix
        run: node scripts/check-nav-v2-task-edge-identity.mjs

  postgres-17-identity-proof:
    needs: identity-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_task_edge_identity
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_task_edge_identity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_task_edge_identity
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Create synthetic identity environment
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_task_edge_identity_setup.sql
      - name: Prove current conflict and explicit actor candidate
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_task_edge_identity_assertions.sql 2>&1 | tee task-edge-identity-postgres.log
      - name: Upload identity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-task-edge-identity
          path: |
            config/nav-v2-task-edge-identity-contract.json
            fixtures/nav-v2-task-edge-identity-scenarios.json
            supabase/functions/nav-v2-deal-api/task-action-edge-identity-v2.js
            tests/sql/nav_v2_task_edge_identity_setup.sql
            tests/sql/nav_v2_task_edge_identity_assertions.sql
            docs/NAV_V2_TASK_EDGE_IDENTITY_GATE_2026-07-17.md
            task-edge-identity-postgres.log
          if-no-files-found: error
          retention-days: 14
