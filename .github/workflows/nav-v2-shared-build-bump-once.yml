name: Navigator v2 one-time shared build bump

on:
  pull_request:
    paths:
      - '.github/workflows/nav-v2-shared-build-bump-once.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nav-v2-shared-build-bump-once
  cancel-in-progress: false

jobs:
  bump-shared-build:
    if: github.head_ref == 'agent/nav-v2-live-public-browser-runtime-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nav-v2-live-public-browser-runtime-v1
          fetch-depth: 0

      - name: Generate atomic build bump
        run: |
          python3 -m py_compile scripts/bump_nav_v2_shared_build.py
          python3 scripts/bump_nav_v2_shared_build.py \
            --from-build 20260723-01 \
            --to-build 20260723-02

      - name: Verify generated scope
        run: |
          test "$(git diff --name-only | grep -E '(^config/nav-v2-build.json$|^config/nav-v2-public-build-attestation-v1.json$|^assets/js/nav-v2/supabase-v2.js$|^nav-system-check-v2.html$|^[^/]+-v2.html$)' | wc -l)" -ge 38
          git diff --check

      - name: Commit generated files to branch
        run: |
          git config user.name 'navigator-build-bot'
          git config user.email 'navigator-build-bot@users.noreply.github.com'
          git add -- '*.html' config/nav-v2-build.json config/nav-v2-public-build-attestation-v1.json assets/js/nav-v2/supabase-v2.js
          git commit -m 'Navigator v2: generate shared build 20260723-02'
          git push origin HEAD:agent/nav-v2-live-public-browser-runtime-v1
