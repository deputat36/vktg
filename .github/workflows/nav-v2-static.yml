name: Navigator v2 static checks

on:
  pull_request:
    paths:
      - '**.html'
      - 'assets/js/nav-v2/**'
      - 'assets/css/**'
      - 'config/nav-v2-module-budget.json'
      - 'config/nav-v2-build.json'
      - 'config/nav-v2-role-contract.json'
      - 'config/nav-v2-rpc-surface.json'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.mjs'
      - 'tests/e2e/**'
      - 'docs/NAV_V2_*.md'
      - 'supabase/config.toml'
      - 'supabase/functions/nav-v2-deal-api/**'
      - 'supabase/functions/nav-invite-user/**'
      - 'supabase/migrations/**'
      - 'scripts/check_nav_v2_csp.py'
      - 'scripts/check_nav_v2_live_pages.py'
      - 'scripts/check_nav_v2_module_budget.py'
      - 'scripts/check_nav_v2_build_version.py'
      - 'scripts/check_nav_v2_deal_card_hooks.py'
      - 'scripts/check_nav_v2_risk_resolution.py'
      - 'scripts/check_nav_v2_operational_readiness.py'
      - 'scripts/check_nav_v2_e2e_contract.py'
      - 'scripts/check-nav-v2-e2e-env.mjs'
      - 'scripts/prepare-nav-v2-e2e-config.mjs'
      - 'scripts/check_nav_v2_release_integrity_v2.py'
      - 'scripts/check_nav_v2_role_contract.py'
      - 'scripts/check_nav_v2_rpc_surface.py'
      - '.github/workflows/nav-v2-live-pages.yml'
      - '.github/workflows/nav-v2-static.yml'
      - '.github/workflows/nav-v2-authenticated-e2e.yml'
  push:
    branches:
      - main
      - fix/nav-v2-audit-remediations

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Navigator v2 files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path('.')
          errors = []

          required_docs = [
              'docs/NAV_V2_MANUAL_QA.md',
              'docs/NAV_V2_DESIGN_AUDIT.md',
              'docs/NAV_V2_AUDIT_SHORT_20260630.md',
              'docs/NAV_V2_ROLE_MATRIX_20260701.md',
              'docs/NAV_V2_MODULE_MAP_20260701.md',
          ]
          for rel in required_docs:
              if not (root / rel).exists():
                  errors.append(f'Missing required doc: {rel}')

          manual_qa = root / 'docs/NAV_V2_MANUAL_QA.md'
          if manual_qa.exists():
              qa_text = manual_qa.read_text(encoding='utf-8')
              required_qa_markers = [
                  '## Создание доступа и вход',
                  '#16',
                  'manager_id',
                  'nav-accept-invite-v2.html',
                  '## Edge Functions',
                  'nav-v2-deal-api',
                  'nav-invite-user',
                  '#158',
              ]
              for marker in required_qa_markers:
                  if marker not in qa_text:
                      errors.append(f'docs/NAV_V2_MANUAL_QA.md: missing QA marker {marker!r}')

          html_files = sorted(root.glob('*-v2.html')) + sorted(root.glob('nav-v2.html'))
          asset_re = re.compile(r'(?:src|href)="(\./assets/(?:js/nav-v2|css)/[^"?#]+)')
          for html in html_files:
              text = html.read_text(encoding='utf-8')
              for match in asset_re.finditer(text):
                  rel = match.group(1).replace('./', '')
                  if not (root / rel).exists():
                      errors.append(f'{html}: missing asset {rel}')

          role_menu = root / 'assets/js/nav-v2/role-menu-v2.js'
          if role_menu.exists():
              text = role_menu.read_text(encoding='utf-8')
              bad = "role === 'spn'" in text and "diagnostics-v2.html', 'Диагностика'" in text.split("role === 'spn'")[-1].split("role === 'manager'")[0]
              if bad:
                  errors.append('SPN menu block appears to include diagnostics link')

          start_page = root / 'nav-v2.html'
          if start_page.exists():
              text = start_page.read_text(encoding='utf-8')
              if 'diagnostics-v2.html' in text or 'nav-system-check-v2.html' in text:
                  errors.append('Start page must not expose technical links')

          dashboard = root / 'assets/js/nav-v2/dashboard-v2.js'
          if dashboard.exists() and 'canSeeSystemCheck' not in dashboard.read_text(encoding='utf-8'):
              errors.append('Dashboard must gate system check by role')

          start_module = root / 'assets/js/nav-v2/start-v2.js'
          if start_module.exists():
              start_text = start_module.read_text(encoding='utf-8')
              required_start_gate = "const canSeeSystemCheck = role === 'owner' || role === 'admin';"
              required_start_link = "${canSeeSystemCheck ? '<a class=\"btn light\" href=\"./nav-system-check-v2.html\">Проверка</a>' : ''}"
              if required_start_gate not in start_text or required_start_link not in start_text:
                  errors.append('Start module must gate system check by owner/admin role')

          cleanup = root / 'assets/js/nav-v2/nav-base-menu-cleanup-v2.js'
          if not cleanup.exists():
              errors.append('Missing base menu cleanup helper')
          for rel in ['deals-v2.html', 'deal-card-v2.html', 'admin-v2.html', 'nav-access-audit-v2.html', 'queue-v2.html']:
              page = root / rel
              if page.exists() and 'nav-base-menu-cleanup-v2.js' not in page.read_text(encoding='utf-8'):
                  errors.append(f'{rel}: missing base menu cleanup helper')

          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('Navigator v2 static checks passed')
          PY
      - name: Check release integrity
        run: python3 scripts/check_nav_v2_release_integrity_v2.py
      - name: Check RPC surface registry
        run: python3 scripts/check_nav_v2_rpc_surface.py
      - name: Check page module budgets
        run: python3 scripts/check_nav_v2_module_budget.py
      - name: Check shared Navigator build version
        run: python3 scripts/check_nav_v2_build_version.py
      - name: Check explicit deal-card hooks
        run: python3 scripts/check_nav_v2_deal_card_hooks.py
      - name: Check risk resolution lifecycle
        run: python3 scripts/check_nav_v2_risk_resolution.py
      - name: Check operational readiness preview
        run: python3 scripts/check_nav_v2_operational_readiness.py
      - name: Check authenticated browser E2E contract
        run: python3 scripts/check_nav_v2_e2e_contract.py
      - name: Check baseline CSP
        run: python3 scripts/check_nav_v2_csp.py
      - name: Check role route contract
        run: python3 scripts/check_nav_v2_role_contract.py
      - name: Compile live Pages smoke script
        run: python3 -m py_compile scripts/check_nav_v2_live_pages.py
