name: Navigator v2 operational pilot owner decision

on:
  pull_request:
    paths:
      - 'operational-adoption-v2.html'
      - 'operational-pilot-decision-v2.html'
      - 'assets/js/nav-v2/operational-pilot-decision-v2.js'
      - 'assets/js/nav-v2/operational-adoption-pilot-decision-v2.js'
      - 'config/nav-v2-module-budget.json'
      - 'scripts/check_nav_v2_operational_pilot_owner_decision.py'
      - 'scripts/check-nav-v2-operational-pilot-owner-decision.mjs'
      - 'tests/e2e/public-smoke.spec.js'
      - '.github/workflows/nav-v2-operational-pilot-owner-decision.yml'
      - '.github/workflows/nav-v2-static.yml'
  push:
    branches:
      - main
    paths:
      - 'operational-adoption-v2.html'
      - 'operational-pilot-decision-v2.html'
      - 'assets/js/nav-v2/operational-pilot-decision-v2.js'
      - 'assets/js/nav-v2/operational-adoption-pilot-decision-v2.js'
      - 'config/nav-v2-module-budget.json'
      - 'scripts/check_nav_v2_operational_pilot_owner_decision.py'
      - 'scripts/check-nav-v2-operational-pilot-owner-decision.mjs'
      - 'tests/e2e/public-smoke.spec.js'
      - '.github/workflows/nav-v2-operational-pilot-owner-decision.yml'
      - '.github/workflows/nav-v2-static.yml'

permissions:
  contents: read

jobs:
  owner-decision-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check pilot owner decision static contract
        run: python3 scripts/check_nav_v2_operational_pilot_owner_decision.py
      - name: Check pilot owner decision semantics
        run: node scripts/check-nav-v2-operational-pilot-owner-decision.mjs
      - name: Check page module budgets
        run: python3 scripts/check_nav_v2_module_budget.py
      - name: Check operational adoption compatibility
        run: |
          python3 scripts/check_nav_v2_operational_adoption.py
          python3 scripts/check_nav_v2_operational_pilot_shortlist.py
      - name: Compile Python regression
        run: python3 -m py_compile scripts/check_nav_v2_operational_pilot_owner_decision.py
