name: Navigator v2 lawyer handoff dialog

on:
  pull_request:
    paths:
      - 'deal-card-v2.html'
      - 'assets/js/nav-v2/action-dialog-model-v2.js'
      - 'assets/js/nav-v2/deal-card-lawyer-handoff-dialog-v2.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check-nav-v2-action-dialog.mjs'
      - 'scripts/check_nav_v2_action_dialog.py'
      - 'tests/e2e/lawyer-handoff-dialog.spec.js'
      - 'tests/fixtures/nav-v2-lawyer-handoff-dialog.html'
      - '.github/workflows/nav-v2-lawyer-handoff-dialog.yml'
  push:
    branches:
      - main
    paths:
      - 'deal-card-v2.html'
      - 'assets/js/nav-v2/action-dialog-model-v2.js'
      - 'assets/js/nav-v2/deal-card-lawyer-handoff-dialog-v2.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check-nav-v2-action-dialog.mjs'
      - 'scripts/check_nav_v2_action_dialog.py'
      - 'tests/e2e/lawyer-handoff-dialog.spec.js'
      - 'tests/fixtures/nav-v2-lawyer-handoff-dialog.html'
      - '.github/workflows/nav-v2-lawyer-handoff-dialog.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semantic-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: JavaScript syntax
        run: |
          node --check assets/js/nav-v2/action-dialog-model-v2.js
          node --check assets/js/nav-v2/deal-card-lawyer-handoff-dialog-v2.js
          node --check assets/js/nav-v2/deal-card-recheck-alert-v2.js
          node --check scripts/check-nav-v2-action-dialog.mjs
          node --check tests/e2e/lawyer-handoff-dialog.spec.js
      - name: Shared action dialog semantic contract
        run: node scripts/check-nav-v2-action-dialog.mjs
      - name: Shared action dialog source contract
        run: python3 scripts/check_nav_v2_action_dialog.py
      - name: Python syntax
        run: python3 -m py_compile scripts/check_nav_v2_action_dialog.py

  public-browser:
    needs: semantic-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run lawyer handoff dialog regression
        run: npx playwright test tests/e2e/lawyer-handoff-dialog.spec.js --project=chromium-desktop --project=chromium-mobile
      - name: Upload lawyer handoff evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-lawyer-handoff-dialog-e2e
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
