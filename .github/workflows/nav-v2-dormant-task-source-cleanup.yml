name: Navigator v2 dormant task source cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
    paths:
      - '.github/workflows/nav-v2-dormant-task-source-cleanup.yml'
      - 'assets/js/nav-v2/deal-card-v2.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  exact-source-cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Remove exact dormant task mutation block
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('assets/js/nav-v2/deal-card-v2.js')
          text = path.read_text(encoding='utf-8')
          block = """  document.querySelectorAll('[data-task-id]').forEach((btn) => btn.onclick = async () => {
            if (!confirmDemoAction('изменить статус задачи')) return;
            try { setPageStatus('Обновляю задачу...'); await rpc('nav_v2_update_task_status', { p_task_id: btn.dataset.taskId, p_status: btn.dataset.taskStatus }); await load(); }
            catch (e) { setPageStatus('Ошибка задачи: ' + e.message, 'error'); }
          });
          """
          count = text.count(block)
          if count != 1:
              raise SystemExit(f'expected one dormant task block, found {count}')
          updated = text.replace(block, '', 1)
          if "rpc('nav_v2_update_task_status'" in updated:
              raise SystemExit('legacy task mutation literal remains in deal-card-v2.js')
          path.write_text(updated, encoding='utf-8')
          PY
      - name: Validate exact edit
        run: |
          node --check assets/js/nav-v2/deal-card-v2.js
          git diff --check
          test "$(git diff --numstat -- assets/js/nav-v2/deal-card-v2.js | awk '{print $1}')" = "0"
          test "$(git diff --numstat -- assets/js/nav-v2/deal-card-v2.js | awk '{print $2}')" = "5"
      - name: Commit exact cleanup
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/js/nav-v2/deal-card-v2.js
          git commit -m 'Navigator v2: remove dormant base task mutation handler'
          git push origin HEAD:${TARGET_BRANCH}
