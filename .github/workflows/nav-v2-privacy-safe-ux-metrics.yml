name: Navigator v2 privacy-safe UX metrics

on:
  pull_request:
    paths:
      - 'ux-metrics-v2.html'
      - 'assets/js/nav-v2/ux-metrics-*.js'
      - 'assets/js/nav-v2/nav-base-menu-cleanup-v2.js'
      - 'config/nav-v2-module-budget.json'
      - 'tests/e2e/public-smoke.spec.js'
      - 'scripts/check_nav_v2_privacy_safe_ux_metrics.py'
      - 'scripts/check-nav-v2-privacy-safe-ux-metrics.mjs'
      - '.github/workflows/nav-v2-privacy-safe-ux-metrics.yml'
  push:
    branches:
      - main
    paths:
      - 'ux-metrics-v2.html'
      - 'assets/js/nav-v2/ux-metrics-*.js'
      - 'assets/js/nav-v2/nav-base-menu-cleanup-v2.js'
      - 'config/nav-v2-module-budget.json'
      - 'tests/e2e/public-smoke.spec.js'
      - 'scripts/check_nav_v2_privacy_safe_ux_metrics.py'
      - 'scripts/check-nav-v2-privacy-safe-ux-metrics.mjs'
      - '.github/workflows/nav-v2-privacy-safe-ux-metrics.yml'

jobs:
  privacy-safe-ux-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check privacy-safe UX contract
        run: python3 scripts/check_nav_v2_privacy_safe_ux_metrics.py
      - name: Check privacy-safe UX semantics
        run: node scripts/check-nav-v2-privacy-safe-ux-metrics.mjs
      - name: Check JavaScript syntax
        run: |
          node --check assets/js/nav-v2/ux-metrics-model-v2.js
          node --check assets/js/nav-v2/ux-metrics-session-v2.js
          node --check assets/js/nav-v2/ux-metrics-v2.js
          node --check assets/js/nav-v2/nav-base-menu-cleanup-v2.js
      - name: Compile Python contract
        run: python3 -m py_compile scripts/check_nav_v2_privacy_safe_ux_metrics.py
