name: Navigator v2 deal-card-lite DTO prototype

on:
  pull_request:
    paths:
      - 'config/nav-v2-deal-card-lite-dto-contract.json'
      - 'supabase/prototypes/**'
      - 'docs/NAV_V2_DEAL_CARD_LITE_DTO_PROTOTYPE_2026-07-16.md'
      - 'scripts/check_nav_v2_deal_card_lite_dto_prototype*.py'
      - '.github/workflows/nav-v2-deal-card-lite-dto-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prototype-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate prototype contract
        run: python3 scripts/check_nav_v2_deal_card_lite_dto_prototype_runner.py
      - name: Compile checkers
        run: python3 -m py_compile scripts/check_nav_v2_deal_card_lite_dto_prototype*.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-deal-card-lite-dto-prototype
          path: |
            config/nav-v2-deal-card-lite-dto-contract.json
            supabase/prototypes/nav_v2_get_deal_card_lite_explicit_dto.sql
            docs/NAV_V2_DEAL_CARD_LITE_DTO_PROTOTYPE_2026-07-16.md
          if-no-files-found: error
