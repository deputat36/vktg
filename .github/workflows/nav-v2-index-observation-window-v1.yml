name: Navigator v2 index observation window v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-index-observation-window-v1.json'
      - 'config/nav-v2-performance-advisor-attestation-v1.json'
      - 'config/nav-v2-query-to-index-mapping-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-evidence-v1.json'
      - 'config/nav-v2-index-write-storage-measurement-v1.json'
      - 'config/nav-v2-production-scale-fk-benchmark-plan-v1.json'
      - 'tests/sql/nav_v2_index_observation_window_readonly_capture_v1.sql'
      - 'scripts/check_nav_v2_index_observation_window_v1.py'
      - 'docs/NAV_V2_INDEX_OBSERVATION_WINDOW_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-index-observation-window-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-index-observation-window-v1.json'
      - 'config/nav-v2-performance-advisor-attestation-v1.json'
      - 'config/nav-v2-query-to-index-mapping-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-evidence-v1.json'
      - 'config/nav-v2-index-write-storage-measurement-v1.json'
      - 'config/nav-v2-production-scale-fk-benchmark-plan-v1.json'
      - 'tests/sql/nav_v2_index_observation_window_readonly_capture_v1.sql'
      - 'scripts/check_nav_v2_index_observation_window_v1.py'
      - 'docs/NAV_V2_INDEX_OBSERVATION_WINDOW_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-index-observation-window-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-contract-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate observation JSON
        run: python3 -m json.tool config/nav-v2-index-observation-window-v1.json > /dev/null

      - name: Compile observation validator
        run: python3 -m py_compile scripts/check_nav_v2_index_observation_window_v1.py

      - name: Validate fail-closed observation-window contract
        run: python3 scripts/check_nav_v2_index_observation_window_v1.py
