name: Navigator v2 sensitive free-text guard

on:
  pull_request:
    paths:
      - 'spn-v2.html'
      - 'assets/js/nav-v2/sensitive-free-text-*.js'
      - 'assets/js/nav-v2/spn-party-names-adaptive-v2.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check_nav_v2_sensitive_free_text_guard.py'
      - 'scripts/check-nav-v2-sensitive-free-text.mjs'
      - 'tests/fixtures/nav-v2-sensitive-free-text-guard.html'
      - 'tests/e2e/sensitive-free-text-guard.spec.js'
      - '.github/workflows/nav-v2-sensitive-free-text-guard.yml'
  push:
    branches: [main]
    paths:
      - 'spn-v2.html'
      - 'assets/js/nav-v2/sensitive-free-text-*.js'
      - 'assets/js/nav-v2/spn-party-names-adaptive-v2.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check_nav_v2_sensitive_free_text_guard.py'
      - 'scripts/check-nav-v2-sensitive-free-text.mjs'
      - 'tests/fixtures/nav-v2-sensitive-free-text-guard.html'
      - 'tests/e2e/sensitive-free-text-guard.spec.js'
      - '.github/workflows/nav-v2-sensitive-free-text-guard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semantic-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: JavaScript syntax
        run: |
          node --check assets/js/nav-v2/sensitive-free-text-model-v2.js
          node --check assets/js/nav-v2/sensitive-free-text-guard-v2.js
          node --check assets/js/nav-v2/spn-party-names-adaptive-v2.js
          node --check assets/js/nav-v2/deal-card-recheck-alert-v2.js
          node --check scripts/check-nav-v2-sensitive-free-text.mjs
          node --check tests/e2e/sensitive-free-text-guard.spec.js
      - name: Source and semantic contracts
        run: |
          python3 scripts/check_nav_v2_sensitive_free_text_guard.py
          node scripts/check-nav-v2-sensitive-free-text.mjs
          python3 scripts/check_nav_v2_client_data_minimization.py
          python3 scripts/check_nav_v2_deal_card_hooks.py
          python3 scripts/check_nav_v2_form_association.py
      - name: Python syntax
        run: python3 -m py_compile scripts/check_nav_v2_sensitive_free_text_guard.py

  public-browser:
    needs: semantic-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run browser regression
        run: npx playwright test tests/e2e/sensitive-free-text-guard.spec.js --project=chromium-desktop --project=chromium-mobile
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-sensitive-free-text-guard-e2e
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
