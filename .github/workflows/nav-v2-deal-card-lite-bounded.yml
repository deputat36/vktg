name: Navigator v2 deal-card-lite bounded DTO

on:
  pull_request:
    paths:
      - 'config/nav-v2-deal-card-lite-bounded-contract.json'
      - 'supabase/prototypes/nav_v2_get_deal_card_lite_explicit_dto.sql'
      - 'supabase/prototypes/nav_v2_get_deal_card_lite_bounded_tasks.sql'
      - 'supabase/prototypes/nav_v2_bounded_task_contract.sql'
      - 'supabase/prototypes/nav_v2_bounded_task_mutations.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_setup.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_setup.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_assertions.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_rollback.sql'
      - 'scripts/check_nav_v2_deal_card_lite_bounded.py'
      - 'docs/NAV_V2_DEAL_CARD_LITE_BOUNDED_DTO_2026-07-16.md'
      - '.github/workflows/nav-v2-deal-card-lite-bounded.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-17-lite-bounded-dto:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_lite_bounded_dto
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_lite_bounded_dto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_lite_bounded_dto
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Validate source contract
        run: python3 scripts/check_nav_v2_deal_card_lite_bounded.py

      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_deal_card_lite_bounded.py

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Create bounded-task synthetic environment
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_setup.sql

      - name: Extend setup for lite DTO
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_deal_card_lite_bounded_setup.sql

      - name: Apply bounded task base contract
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_contract.sql

      - name: Apply governed bounded task mutations
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_mutations.sql

      - name: Apply explicit lite DTO baseline
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_get_deal_card_lite_explicit_dto.sql

      - name: Apply contract-aware lite DTO overlay
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_get_deal_card_lite_bounded_tasks.sql

      - name: Run role, privacy and no-mutation assertions
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_deal_card_lite_bounded_assertions.sql 2>&1 | tee lite-bounded-dto-assertions.log

      - name: Rehearse DTO rollback
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_deal_card_lite_bounded_rollback.sql

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-deal-card-lite-bounded
          path: |
            config/nav-v2-deal-card-lite-bounded-contract.json
            supabase/prototypes/nav_v2_get_deal_card_lite_bounded_tasks.sql
            tests/sql/nav_v2_deal_card_lite_bounded_assertions.sql
            tests/sql/nav_v2_deal_card_lite_bounded_rollback.sql
            docs/NAV_V2_DEAL_CARD_LITE_BOUNDED_DTO_2026-07-16.md
            lite-bounded-dto-assertions.log
          if-no-files-found: error
