name: Navigator v2 bounded readiness checker fix

on:
  pull_request:
    paths:
      - 'scripts/check_nav_v2_bounded_task_deployment_readiness.py'
      - '.github/workflows/nav-v2-bounded-readiness-checker-fix.yml'

permissions:
  contents: write

jobs:
  exact-marker-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Update one assertion marker
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/check_nav_v2_bounded_task_deployment_readiness.py')
          text = path.read_text(encoding='utf-8')
          old = 'legacy task was not preserved by complete rollback'
          new = 'intentional status exercise was not preserved by complete rollback'
          if text.count(old) != 1:
              raise SystemExit(f'expected one old marker, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 scripts/check_nav_v2_bounded_task_deployment_readiness.py
      - name: Commit exact marker fix
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/check_nav_v2_bounded_task_deployment_readiness.py
          git commit -m 'Navigator v2: align readiness checker with legacy status exercise'
          git push origin HEAD:${TARGET_BRANCH}
