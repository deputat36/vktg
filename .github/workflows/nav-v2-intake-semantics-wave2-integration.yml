name: Navigator v2 intake semantics wave2 integration

on:
  pull_request:
    paths:
      - 'config/nav-v2-intake-contract-v1.json'
      - 'config/nav-v2-intake-save-integration-v1.json'
      - 'config/nav-v2-intake-semantics-wave1-qualification.json'
      - 'config/nav-v2-intake-semantics-wave1-integration-v1.json'
      - 'config/nav-v2-intake-semantics-wave2-qualification.json'
      - 'config/nav-v2-intake-semantics-wave2-integration-v1.json'
      - 'scripts/render-nav-v2-intake-server-adapter-v1.mjs'
      - 'scripts/check_nav_v2_intake_semantics_wave2_integration.py'
      - 'scripts/check-nav-v2-intake-semantics-wave2-integration.mjs'
      - 'supabase/prototypes/nav_v2_intake_*.sql'
      - 'supabase/prototypes/nav_v2_governed_intake_save_boundary_v1.sql'
      - 'tests/sql/nav_v2_intake_adapter_harness_*.sql'
      - 'tests/sql/nav_v2_intake_save_integration_harness_*.sql'
      - 'tests/sql/nav_v2_governed_intake_save_*.sql'
      - 'tests/sql/nav_v2_intake_production_schema_*.sql'
      - 'tests/sql/nav_v2_intake_semantics_wave1_*.sql'
      - 'tests/sql/nav_v2_intake_semantics_wave2_*.sql'
      - 'docs/NAV_V2_INTAKE_SEMANTICS_WAVE2_INTEGRATION_2026-07-20.md'
      - '.github/workflows/nav-v2-intake-semantics-wave2-integration.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-intake-semantics-wave2-integration-v1.json'
      - 'scripts/check_nav_v2_intake_semantics_wave2_integration.py'
      - 'scripts/check-nav-v2-intake-semantics-wave2-integration.mjs'
      - 'supabase/prototypes/nav_v2_intake_semantics_wave2_integration_v1.sql'
      - 'tests/sql/nav_v2_intake_semantics_wave2_*.sql'
      - 'docs/NAV_V2_INTAKE_SEMANTICS_WAVE2_INTEGRATION_2026-07-20.md'
      - '.github/workflows/nav-v2-intake-semantics-wave2-integration.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate wave2 integration source boundary
        run: python3 scripts/check_nav_v2_intake_semantics_wave2_integration.py
      - name: Validate wave2 integration semantics
        run: node scripts/check-nav-v2-intake-semantics-wave2-integration.mjs
      - name: Compile source checker
        run: python3 -m py_compile scripts/check_nav_v2_intake_semantics_wave2_integration.py

  postgres-17-governed-integration:
    needs: static-contract
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_wave2_governed
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_wave2_governed"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_wave2_governed
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Render canonical intake adapter
        run: node scripts/render-nav-v2-intake-server-adapter-v1.mjs --output /tmp/nav_v2_intake_save_adapter_v1.sql
      - name: Create synthetic base roles and marker rows
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_adapter_harness_setup.sql
      - name: Create exact sanitizer and legacy preview harness
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_save_integration_harness_setup.sql
      - name: Apply canonical adapter
        run: psql -v ON_ERROR_STOP=1 -f /tmp/nav_v2_intake_save_adapter_v1.sql
      - name: Preserve canonical adapter regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_adapter_harness_assertions.sql
      - name: Apply base legacy integration preview
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_save_integration_v1.sql
      - name: Preserve base integration regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_save_integration_harness_assertions.sql
      - name: Apply governed ledger and base write plan
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_governed_intake_save_boundary_v1.sql
      - name: Create governed shadow business harness
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_governed_intake_save_harness_setup.sql
      - name: Preserve governed base regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_governed_intake_save_assertions.sql
      - name: Apply wave1 qualification
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave1_qualification.sql
      - name: Apply wave1 effective integration
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave1_integration_v1.sql
      - name: Create wave1 governed harness
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_integration_harness_setup.sql
      - name: Preserve wave1 governed rule regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_integration_rule_assertions.sql
      - name: Preserve wave1 governed negative regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_integration_negative_assertions.sql
      - name: Apply wave2 qualification
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave2_qualification.sql
      - name: Apply wave2 effective integration
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave2_integration_v1.sql
      - name: Create wave2 governed harness
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_integration_harness_setup.sql
      - name: Run four wave2 governed rule and replay assertions
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_integration_rule_assertions.sql
      - name: Run combined, remaining unsupported and failure rollback assertions
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_integration_negative_assertions.sql 2>&1 | tee nav-v2-wave2-governed-assertions.log
      - name: Roll back wave2 integration overlay
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_integration_rollback.sql
      - name: Roll back wave2 qualification
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_rollback.sql
      - name: Normalize synthetic governed rows
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_governed_cleanup_for_base_rollback.sql
      - name: Roll back wave1 integration overlay
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_integration_rollback.sql
      - name: Roll back wave1 qualification
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_rollback.sql
      - name: Roll back governed base
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_governed_intake_save_rollback.sql
      - name: Roll back integration base
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_save_integration_harness_rollback.sql
      - name: Roll back canonical adapter
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_adapter_harness_rollback.sql
      - name: Upload governed integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-intake-semantics-wave2-governed
          path: |
            config/nav-v2-intake-semantics-wave2-integration-v1.json
            supabase/prototypes/nav_v2_intake_semantics_wave2_integration_v1.sql
            tests/sql/nav_v2_intake_semantics_wave2_*.sql
            nav-v2-wave2-governed-assertions.log
          if-no-files-found: warn
          retention-days: 14

  postgres-17-production-schema:
    needs: static-contract
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_wave2_schema
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_wave2_schema"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5433
      PGDATABASE: navigator_wave2_schema
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Create exact production-like write surface
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_production_schema_harness_setup.sql
      - name: Apply base production schema mapper
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_production_schema_mapping_v1.sql
      - name: Run previous 13-rule production schema regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_production_schema_assertions.sql
      - name: Apply wave1 qualification
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave1_qualification.sql
      - name: Apply wave1 mapper overlay
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave1_integration_v1.sql
      - name: Create wave1 exact-schema plans
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_mapping_plan_setup.sql
      - name: Create wave1 exact-schema writer
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_mapping_writer_setup.sql
      - name: Preserve wave1 17-fixture regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_mapping_assertions.sql
      - name: Preserve wave1 negative regression
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_mapping_negative_assertions.sql
      - name: Apply wave2 qualification
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave2_qualification.sql
      - name: Apply wave2 mapper overlay
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_intake_semantics_wave2_integration_v1.sql
      - name: Create wave2 exact-schema plans
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_mapping_plan_setup.sql
      - name: Create wave2 exact-schema writer
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_mapping_writer_setup.sql
      - name: Run base 17 plus wave2 four schema assertions
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_mapping_assertions.sql 2>&1 | tee nav-v2-wave2-schema-assertions.log
      - name: Run remaining unsupported, qualification, tamper and FK assertions
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_mapping_negative_assertions.sql
      - name: Roll back wave2 integration overlay
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_integration_rollback.sql
      - name: Roll back wave2 qualification
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave2_qualification_only_rollback.sql
      - name: Roll back wave1 integration overlay
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_integration_rollback.sql
      - name: Roll back wave1 qualification
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_semantics_wave1_qualification_only_rollback.sql
      - name: Roll back exact production-like schema
        if: always()
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_intake_production_schema_rollback.sql
      - name: Upload exact-schema evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-intake-semantics-wave2-production-schema
          path: |
            config/nav-v2-intake-semantics-wave2-integration-v1.json
            supabase/prototypes/nav_v2_intake_semantics_wave2_integration_v1.sql
            tests/sql/nav_v2_intake_semantics_wave2_mapping_*.sql
            nav-v2-wave2-schema-assertions.log
          if-no-files-found: warn
          retention-days: 14
