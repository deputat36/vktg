name: Navigator v2 task dual-path contract

on:
  pull_request:
    paths:
      - 'assets/js/nav-v2/task-action-router-v2.js'
      - 'assets/js/nav-v2/task-action-guard-v2.js'
      - 'assets/js/nav-v2/deal-card-v2.js'
      - 'supabase/functions/nav-v2-deal-api/index.ts'
      - 'supabase/functions/nav-v2-deal-api/task-action-contract-v2.js'
      - 'supabase/functions/nav-v2-deal-api/task-action-edge-runtime-v2.js'
      - 'config/nav-v2-task-dual-path-contract.json'
      - 'config/nav-v2-task-edge-runtime-integration-v1.json'
      - 'fixtures/nav-v2-task-dual-path-scenarios.json'
      - 'scripts/check-nav-v2-task-dual-path.mjs'
      - 'scripts/check_nav_v2_task_dual_path.py'
      - 'tests/fixtures/nav-v2-task-action-dual-path.html'
      - 'tests/e2e/task-action-dual-path.spec.js'
      - 'docs/NAV_V2_TASK_DUAL_PATH_CONTRACT_2026-07-16.md'
      - '.github/workflows/nav-v2-task-dual-path.yml'
  workflow_dispatch:

jobs:
  dual-path-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate source contract
        run: python3 scripts/check_nav_v2_task_dual_path.py

      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_task_dual_path.py

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/nav-v2/task-action-router-v2.js
          node --check supabase/functions/nav-v2-deal-api/task-action-contract-v2.js
          node --check supabase/functions/nav-v2-deal-api/task-action-edge-runtime-v2.js
          node --check scripts/check-nav-v2-task-dual-path.mjs
          node --check tests/e2e/task-action-dual-path.spec.js

      - name: Run semantic scenarios
        run: node scripts/check-nav-v2-task-dual-path.mjs

      - name: Prove both bounded network feature flags remain disabled
        run: |
          grep -F 'const BOUNDED_TRANSPORT_ENABLED = false;' assets/js/nav-v2/task-action-guard-v2.js
          grep -F 'const BOUNDED_TASK_EDGE_IDENTITY_ENABLED = false;' supabase/functions/nav-v2-deal-api/index.ts

      - name: Install browser dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run synthetic dual-path browser test
        run: npx playwright test tests/e2e/task-action-dual-path.spec.js --project=chromium-desktop

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-task-dual-path
          path: |
            config/nav-v2-task-dual-path-contract.json
            config/nav-v2-task-edge-runtime-integration-v1.json
            fixtures/nav-v2-task-dual-path-scenarios.json
            docs/NAV_V2_TASK_DUAL_PATH_CONTRACT_2026-07-16.md
            tests/e2e/task-action-dual-path.spec.js
