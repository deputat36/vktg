name: Navigator v2 form associations

on:
  pull_request:
    paths:
      - 'dashboard-v2.html'
      - 'deals-v2.html'
      - 'deal-card-v2.html'
      - 'manager-v2.html'
      - 'assets/js/nav-v2/form-association-*.js'
      - 'assets/js/nav-v2/screen-structure-v2.js'
      - 'scripts/check_nav_v2_form_associations.py'
      - 'scripts/check-nav-v2-form-associations.mjs'
      - 'tests/e2e/form-associations.spec.js'
      - 'tests/fixtures/nav-v2-form-associations.html'
      - '.github/workflows/nav-v2-form-associations.yml'
  push:
    branches:
      - main
    paths:
      - 'dashboard-v2.html'
      - 'deals-v2.html'
      - 'deal-card-v2.html'
      - 'manager-v2.html'
      - 'assets/js/nav-v2/form-association-*.js'
      - 'assets/js/nav-v2/screen-structure-v2.js'
      - 'scripts/check_nav_v2_form_associations.py'
      - 'scripts/check-nav-v2-form-associations.mjs'
      - 'tests/e2e/form-associations.spec.js'
      - 'tests/fixtures/nav-v2-form-associations.html'
      - '.github/workflows/nav-v2-form-associations.yml'

permissions:
  contents: read

jobs:
  semantic-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: JavaScript syntax
        run: |
          node --check assets/js/nav-v2/form-association-model-v2.js
          node --check assets/js/nav-v2/form-association-v2.js
          node --check assets/js/nav-v2/screen-structure-v2.js
          node --check scripts/check-nav-v2-form-associations.mjs
          node --check tests/e2e/form-associations.spec.js
      - name: Semantic form association contract
        run: node scripts/check-nav-v2-form-associations.mjs
      - name: Static form association contract
        run: python3 scripts/check_nav_v2_form_associations.py
      - name: Python syntax
        run: python3 -m py_compile scripts/check_nav_v2_form_associations.py

  public-browser:
    needs: semantic-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run form association regression
        run: npx playwright test tests/e2e/form-associations.spec.js --project=chromium-desktop --project=chromium-mobile
      - name: Upload form association evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-form-associations-e2e
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
