name: Navigator v2 bounded task deployment readiness

on:
  pull_request:
    paths:
      - 'config/nav-v2-bounded-task-deployment-readiness.json'
      - 'supabase/prototypes/nav_v2_bounded_task_contract.sql'
      - 'supabase/prototypes/nav_v2_bounded_task_mutations.sql'
      - 'supabase/prototypes/nav_v2_get_deal_card_lite_explicit_dto.sql'
      - 'supabase/prototypes/nav_v2_get_deal_card_lite_bounded_tasks.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_setup.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_setup.sql'
      - 'tests/sql/nav_v2_bounded_task_deployment_snapshot.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_assertions_part*.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_deployment_readiness_assertions.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_base_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_base_rollback_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_deployment_final_assertions.sql'
      - 'scripts/check_nav_v2_bounded_task_deployment_readiness.py'
      - 'docs/NAV_V2_BOUNDED_TASK_DEPLOYMENT_READINESS_2026-07-17.md'
      - '.github/workflows/nav-v2-bounded-task-deployment-readiness.yml'
  push:
    branches:
      - main
    paths:
      - 'config/nav-v2-bounded-task-deployment-readiness.json'
      - 'supabase/prototypes/nav_v2_bounded_task_contract.sql'
      - 'supabase/prototypes/nav_v2_bounded_task_mutations.sql'
      - 'supabase/prototypes/nav_v2_get_deal_card_lite_explicit_dto.sql'
      - 'supabase/prototypes/nav_v2_get_deal_card_lite_bounded_tasks.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_setup.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_setup.sql'
      - 'tests/sql/nav_v2_bounded_task_deployment_snapshot.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_assertions_part*.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_deployment_readiness_assertions.sql'
      - 'tests/sql/nav_v2_deal_card_lite_bounded_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_base_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_base_rollback_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_deployment_final_assertions.sql'
      - 'scripts/check_nav_v2_bounded_task_deployment_readiness.py'
      - 'docs/NAV_V2_BOUNDED_TASK_DEPLOYMENT_READINESS_2026-07-17.md'
      - '.github/workflows/nav-v2-bounded-task-deployment-readiness.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment readiness source contract
        run: python3 scripts/check_nav_v2_bounded_task_deployment_readiness.py
      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_bounded_task_deployment_readiness.py

  mutation-lifecycle-dry-run:
    needs: manifest-static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_bounded_deployment_mutation
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_bounded_deployment_mutation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_bounded_deployment_mutation
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Create synthetic legacy environment
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_setup.sql
      - name: Apply bounded task base contract
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_contract.sql
      - name: Apply governed bounded task mutations
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_mutations.sql
      - name: Run existing role, lifecycle, evidence and separation assertions
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_assertions.sql 2>&1 | tee bounded-deployment-mutation.log
      - name: Rehearse mutation rollback
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_rollback.sql
      - name: Rehearse bounded base rollback
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_base_rollback.sql
      - name: Assert complete legacy restoration
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_base_rollback_assertions.sql 2>&1 | tee bounded-deployment-mutation-rollback.log
      - name: Upload mutation dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-bounded-task-deployment-readiness-mutation
          path: |
            bounded-deployment-mutation.log
            bounded-deployment-mutation-rollback.log
            config/nav-v2-bounded-task-deployment-readiness.json
            docs/NAV_V2_BOUNDED_TASK_DEPLOYMENT_READINESS_2026-07-17.md
          if-no-files-found: error
          retention-days: 14

  dto-lifecycle-dry-run:
    needs: manifest-static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_bounded_deployment_dto
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_bounded_deployment_dto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_bounded_deployment_dto
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Create synthetic legacy environment
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_setup.sql
      - name: Extend synthetic environment for lite DTO
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_deal_card_lite_bounded_setup.sql
      - name: Snapshot legacy rows and process tables
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_deployment_snapshot.sql
      - name: Apply bounded task base contract
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_contract.sql
      - name: Apply governed bounded task mutations
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_mutations.sql
      - name: Apply explicit lite DTO baseline
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_get_deal_card_lite_explicit_dto.sql
      - name: Apply contract-aware lite DTO overlay
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_get_deal_card_lite_bounded_tasks.sql
      - name: Run existing role, privacy and no-mutation DTO assertions
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_deal_card_lite_bounded_assertions.sql 2>&1 | tee bounded-deployment-dto.log
      - name: Run aggregated deployment readiness assertions
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_deployment_readiness_assertions.sql 2>&1 | tee bounded-deployment-readiness.log
      - name: Rehearse DTO rollback
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_deal_card_lite_bounded_rollback.sql
      - name: Rehearse mutation rollback
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_rollback.sql
      - name: Rehearse bounded base rollback
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_base_rollback.sql
      - name: Assert complete DTO and schema rollback
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_deployment_final_assertions.sql 2>&1 | tee bounded-deployment-final-rollback.log
      - name: Upload DTO dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-bounded-task-deployment-readiness-dto
          path: |
            bounded-deployment-dto.log
            bounded-deployment-readiness.log
            bounded-deployment-final-rollback.log
            config/nav-v2-bounded-task-deployment-readiness.json
            docs/NAV_V2_BOUNDED_TASK_DEPLOYMENT_READINESS_2026-07-17.md
          if-no-files-found: error
          retention-days: 14
