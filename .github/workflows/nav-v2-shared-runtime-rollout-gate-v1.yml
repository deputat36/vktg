name: Navigator v2 shared runtime rollout gate v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-build.json'
      - 'config/nav-v2-public-build-attestation-v1.json'
      - 'config/nav-v2-live-public-browser-runtime-v1.json'
      - 'config/nav-v2-auth-storage-guard-helper-v1.json'
      - 'config/nav-v2-auth-storage-write-gap-v1.json'
      - '*-v2.html'
      - 'assets/js/nav-v2/supabase-v2.js'
      - 'assets/js/nav-v2/auth-storage-guard-v2.js'
      - 'scripts/bump_nav_v2_shared_build.py'
      - 'scripts/check_nav_v2_build_version.py'
      - 'scripts/check_nav_v2_public_build_attestation_v1.py'
      - 'scripts/check_nav_v2_live_public_browser_runtime_v1.py'
      - 'scripts/check_nav_v2_auth_storage_guard_helper_v1.py'
      - 'scripts/check_nav_v2_auth_storage_write_gap_v1.py'
      - 'scripts/check_nav_v2_work_handoff_latest.py'
      - 'tests/unit/nav-v2-auth-*.test.mjs'
      - 'tests/e2e/live-public-runtime.spec.js'
      - '.github/workflows/nav-v2-shared-runtime-rollout-gate-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-build.json'
      - 'config/nav-v2-public-build-attestation-v1.json'
      - 'config/nav-v2-live-public-browser-runtime-v1.json'
      - 'config/nav-v2-auth-storage-guard-helper-v1.json'
      - 'config/nav-v2-auth-storage-write-gap-v1.json'
      - '*-v2.html'
      - 'assets/js/nav-v2/supabase-v2.js'
      - 'assets/js/nav-v2/auth-storage-guard-v2.js'
      - 'scripts/bump_nav_v2_shared_build.py'
      - 'scripts/check_nav_v2_build_version.py'
      - 'scripts/check_nav_v2_public_build_attestation_v1.py'
      - 'scripts/check_nav_v2_live_public_browser_runtime_v1.py'
      - 'scripts/check_nav_v2_auth_storage_guard_helper_v1.py'
      - 'scripts/check_nav_v2_auth_storage_write_gap_v1.py'
      - 'scripts/check_nav_v2_work_handoff_latest.py'
      - 'tests/unit/nav-v2-auth-*.test.mjs'
      - 'tests/e2e/live-public-runtime.spec.js'
      - '.github/workflows/nav-v2-shared-runtime-rollout-gate-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nav-v2-shared-runtime-rollout-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-runtime-rollout-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JSON and compile checkers
        run: |
          python3 -m json.tool config/nav-v2-build.json > /dev/null
          python3 -m json.tool config/nav-v2-public-build-attestation-v1.json > /dev/null
          python3 -m json.tool config/nav-v2-live-public-browser-runtime-v1.json > /dev/null
          python3 -m json.tool config/nav-v2-auth-storage-guard-helper-v1.json > /dev/null
          python3 -m json.tool config/nav-v2-auth-storage-write-gap-v1.json > /dev/null
          python3 -m py_compile \
            scripts/bump_nav_v2_shared_build.py \
            scripts/check_nav_v2_build_version.py \
            scripts/check_nav_v2_public_build_attestation_v1.py \
            scripts/check_nav_v2_live_public_browser_runtime_v1.py \
            scripts/check_nav_v2_auth_storage_guard_helper_v1.py \
            scripts/check_nav_v2_auth_storage_write_gap_v1.py \
            scripts/check_nav_v2_work_handoff_latest.py

      - name: Validate shared build and evidence boundaries
        run: |
          python3 scripts/check_nav_v2_build_version.py
          python3 scripts/check_nav_v2_public_build_attestation_v1.py
          python3 scripts/check_nav_v2_live_public_browser_runtime_v1.py
          python3 scripts/check_nav_v2_auth_storage_guard_helper_v1.py
          python3 scripts/check_nav_v2_auth_storage_write_gap_v1.py
          python3 scripts/check_nav_v2_work_handoff_latest.py

      - name: Check shared runtime JavaScript syntax
        run: |
          node --check assets/js/nav-v2/supabase-v2.js
          node --check assets/js/nav-v2/auth-storage-guard-v2.js
          node --check tests/e2e/live-public-runtime.spec.js

      - name: Run complete Auth recovery and storage regression set
        run: |
          node tests/unit/nav-v2-auth-session-recovery.test.mjs
          node tests/unit/nav-v2-auth-concurrent-refresh.test.mjs
          node tests/unit/nav-v2-auth-network-no-lock.test.mjs
          node tests/unit/nav-v2-auth-lock-timeout-post-refresh.test.mjs
          node tests/unit/nav-v2-auth-storage-signin-race.test.mjs
          node tests/unit/nav-v2-auth-logout-storage-failure.test.mjs
          node tests/unit/nav-v2-auth-password-reset.test.mjs
          node tests/unit/nav-v2-auth-storage-guard-helper.test.mjs
          node tests/unit/nav-v2-auth-storage-controller-missing-storage.test.mjs
          node tests/unit/nav-v2-auth-storage-fingerprint-recovery.test.mjs
          node tests/unit/nav-v2-auth-storage-write-gap.test.mjs
