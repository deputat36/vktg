name: Navigator v2 manager source remediation

on:
  pull_request:
    paths:
      - 'manager-source-remediation-v2.html'
      - 'assets/js/nav-v2/manager-source-remediation-v2.js'
      - 'assets/js/nav-v2/role-menu-v2.js'
      - 'config/nav-v2-role-contract.json'
      - 'config/nav-v2-rpc-surface.json'
      - 'supabase/migrations/20260713223000_nav_v2_manager_source_remediation_plan.sql'
      - 'scripts/check_nav_v2_manager_source_remediation.py'
      - 'scripts/check_nav_v2_role_contract.py'
      - 'scripts/check_nav_v2_rpc_surface.py'
      - 'scripts/check_nav_v2_release_integrity_v2.py'
      - '.github/workflows/nav-v2-manager-source-remediation.yml'
  push:
    branches:
      - main
    paths:
      - 'manager-source-remediation-v2.html'
      - 'assets/js/nav-v2/manager-source-remediation-v2.js'
      - 'assets/js/nav-v2/role-menu-v2.js'
      - 'config/nav-v2-role-contract.json'
      - 'supabase/migrations/20260713223000_nav_v2_manager_source_remediation_plan.sql'
      - 'scripts/check_nav_v2_manager_source_remediation.py'
      - '.github/workflows/nav-v2-manager-source-remediation.yml'

permissions:
  contents: read

jobs:
  remediation-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check grouped remediation plan
        run: python3 scripts/check_nav_v2_manager_source_remediation.py
      - name: Check role route contract
        run: python3 scripts/check_nav_v2_role_contract.py
      - name: Check RPC surface
        run: python3 scripts/check_nav_v2_rpc_surface.py
      - name: Check release integrity
        run: python3 scripts/check_nav_v2_release_integrity_v2.py
      - name: Compile Python regression
        run: python3 -m py_compile scripts/check_nav_v2_manager_source_remediation.py
