name: Navigator v2 manager source remediation

on:
  pull_request:
    paths:
      - 'manager-source-remediation-v2.html'
      - 'assets/js/nav-v2/manager-source-remediation-v2.js'
      - 'assets/js/nav-v2/manager-source-remediation-validation-v2.js'
      - 'assets/js/nav-v2/manager-source-remediation-server-preview-v2.js'
      - 'assets/js/nav-v2/manager-source-remediation-evidence-bundle-v2.js'
      - 'assets/js/nav-v2/role-menu-v2.js'
      - 'config/nav-v2-module-budget.json'
      - 'config/nav-v2-role-contract.json'
      - 'config/nav-v2-rpc-surface.json'
      - 'config/nav-v2-advisor-scope.json'
      - 'supabase/migrations/20260713223000_nav_v2_manager_source_remediation_plan.sql'
      - 'supabase/migrations/20260713233000_nav_v2_responsibility_evidence_candidates.sql'
      - 'supabase/migrations/20260713234500_nav_v2_responsibility_confirmation_context.sql'
      - 'supabase/migrations/20260714001500_nav_v2_responsibility_point_preview.sql'
      - 'supabase/migrations/20260714001600_nav_v2_responsibility_point_preview_guard.sql'
      - 'scripts/check_nav_v2_manager_source_remediation.py'
      - 'scripts/check_nav_v2_responsibility_point_preview.py'
      - 'scripts/check-nav-v2-responsibility-evidence-bundle.mjs'
      - 'scripts/check_nav_v2_role_contract.py'
      - 'scripts/check_nav_v2_rpc_surface.py'
      - 'scripts/check_nav_v2_release_integrity_v2.py'
      - '.github/workflows/nav-v2-manager-source-remediation.yml'
      - '.github/workflows/nav-v2-static.yml'
  push:
    branches:
      - main
    paths:
      - 'manager-source-remediation-v2.html'
      - 'assets/js/nav-v2/manager-source-remediation-v2.js'
      - 'assets/js/nav-v2/manager-source-remediation-validation-v2.js'
      - 'assets/js/nav-v2/manager-source-remediation-server-preview-v2.js'
      - 'assets/js/nav-v2/manager-source-remediation-evidence-bundle-v2.js'
      - 'assets/js/nav-v2/role-menu-v2.js'
      - 'config/nav-v2-module-budget.json'
      - 'config/nav-v2-role-contract.json'
      - 'config/nav-v2-rpc-surface.json'
      - 'config/nav-v2-advisor-scope.json'
      - 'supabase/migrations/20260713223000_nav_v2_manager_source_remediation_plan.sql'
      - 'supabase/migrations/20260713233000_nav_v2_responsibility_evidence_candidates.sql'
      - 'supabase/migrations/20260713234500_nav_v2_responsibility_confirmation_context.sql'
      - 'supabase/migrations/20260714001500_nav_v2_responsibility_point_preview.sql'
      - 'supabase/migrations/20260714001600_nav_v2_responsibility_point_preview_guard.sql'
      - 'scripts/check_nav_v2_manager_source_remediation.py'
      - 'scripts/check_nav_v2_responsibility_point_preview.py'
      - 'scripts/check-nav-v2-responsibility-evidence-bundle.mjs'
      - '.github/workflows/nav-v2-manager-source-remediation.yml'
      - '.github/workflows/nav-v2-static.yml'

permissions:
  contents: read

jobs:
  remediation-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check grouped remediation, evidence, confirmation, package validation, server preview and evidence bundle
        run: python3 scripts/check_nav_v2_manager_source_remediation.py
      - name: Check responsibility evidence bundle validator
        run: node scripts/check-nav-v2-responsibility-evidence-bundle.mjs
      - name: Check responsibility point preview private wrapper
        run: python3 scripts/check_nav_v2_responsibility_point_preview.py
      - name: Check role route contract
        run: python3 scripts/check_nav_v2_role_contract.py
      - name: Check RPC surface
        run: python3 scripts/check_nav_v2_rpc_surface.py
      - name: Check release integrity
        run: python3 scripts/check_nav_v2_release_integrity_v2.py
      - name: Compile Python regressions
        run: |
          python3 -m py_compile scripts/check_nav_v2_manager_source_remediation.py
          python3 -m py_compile scripts/check_nav_v2_responsibility_point_preview.py
