name: Navigator v2 accessible dialogs

on:
  pull_request:
    paths:
      - 'deal-card-v2.html'
      - 'assets/css/nav-v2-accessible-dialog.css'
      - 'assets/js/nav-v2/accessible-dialog-*.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check-nav-v2-accessible-dialog.mjs'
      - 'scripts/check_nav_v2_accessible_dialog.py'
      - 'scripts/check_nav_v2_async_feedback.py'
      - 'scripts/check_nav_v2_form_association.py'
      - 'tests/e2e/accessible-dialog.spec.js'
      - 'tests/fixtures/nav-v2-accessible-dialog.html'
      - '.github/workflows/nav-v2-accessible-dialog.yml'
  push:
    branches:
      - main
    paths:
      - 'deal-card-v2.html'
      - 'assets/css/nav-v2-accessible-dialog.css'
      - 'assets/js/nav-v2/accessible-dialog-*.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check-nav-v2-accessible-dialog.mjs'
      - 'scripts/check_nav_v2_accessible_dialog.py'
      - 'scripts/check_nav_v2_async_feedback.py'
      - 'scripts/check_nav_v2_form_association.py'
      - 'tests/e2e/accessible-dialog.spec.js'
      - 'tests/fixtures/nav-v2-accessible-dialog.html'
      - '.github/workflows/nav-v2-accessible-dialog.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semantic-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: JavaScript syntax
        run: |
          node --check assets/js/nav-v2/accessible-dialog-model-v2.js
          node --check assets/js/nav-v2/accessible-dialog-v2.js
          node --check assets/js/nav-v2/deal-card-recheck-alert-v2.js
          node --check scripts/check-nav-v2-accessible-dialog.mjs
          node --check tests/e2e/accessible-dialog.spec.js
      - name: Semantic accessible dialog contract
        run: node scripts/check-nav-v2-accessible-dialog.mjs
      - name: Static accessible dialog contract
        run: python3 scripts/check_nav_v2_accessible_dialog.py
      - name: Compatible accessibility contracts
        run: |
          python3 scripts/check_nav_v2_async_feedback.py
          python3 scripts/check_nav_v2_form_association.py
      - name: Python syntax
        run: python3 -m py_compile scripts/check_nav_v2_accessible_dialog.py scripts/check_nav_v2_async_feedback.py scripts/check_nav_v2_form_association.py

  public-browser:
    needs: semantic-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run accessible dialog regression
        run: npx playwright test tests/e2e/accessible-dialog.spec.js --project=chromium-desktop --project=chromium-mobile
      - name: Upload accessible dialog evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-accessible-dialog-e2e
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
