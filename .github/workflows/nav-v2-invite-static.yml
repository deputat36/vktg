name: Navigator v2 invite checks

on:
  pull_request:
    paths:
      - 'supabase/functions/nav-invite-user/**'
      - 'assets/js/nav-v2/nav-temp-password-v2.js'
      - 'assets/js/nav-v2/nav-accept-invite-v2.js'
      - 'assets/js/nav-v2/admin-loader-v2.js'
      - 'assets/js/nav-v2/nav-system-check-v2.js'
      - 'nav-system-check-v2.html'
      - 'scripts/check_nav_v2_invite_flow.py'
      - '.github/workflows/nav-v2-invite-static.yml'
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/nav-invite-user/**'
      - 'assets/js/nav-v2/nav-temp-password-v2.js'
      - 'assets/js/nav-v2/nav-accept-invite-v2.js'
      - 'assets/js/nav-v2/admin-loader-v2.js'
      - 'assets/js/nav-v2/nav-system-check-v2.js'
      - 'nav-system-check-v2.html'
      - 'scripts/check_nav_v2_invite_flow.py'
      - '.github/workflows/nav-v2-invite-static.yml'

jobs:
  invite-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check invite and recovery flow
        run: python3 scripts/check_nav_v2_invite_flow.py
