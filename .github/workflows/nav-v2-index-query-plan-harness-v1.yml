name: Navigator v2 index query-plan harness v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-index-query-plan-candidate-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-evidence-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-attribution-v1.json'
      - 'config/nav-v2-performance-advisor-attestation-v1.json'
      - 'tests/sql/nav_v2_index_query_plan_harness_v1.sql'
      - 'tests/sql/nav_v2_index_fk_parent_mutation_harness_v1.sql'
      - 'tests/sql/nav_v2_index_fk_parent_mutation_attribution_harness_v1.sql'
      - 'scripts/check_nav_v2_index_query_plan_candidate_v1.py'
      - 'scripts/check_nav_v2_index_fk_parent_mutation_evidence_v1.py'
      - 'scripts/check_nav_v2_index_fk_parent_mutation_attribution_v1.py'
      - 'docs/NAV_V2_INDEX_QUERY_PLAN_CANDIDATE_V1_2026-07-21.md'
      - 'docs/NAV_V2_INDEX_FK_PARENT_MUTATION_EVIDENCE_V1_2026-07-21.md'
      - 'docs/NAV_V2_INDEX_FK_PARENT_MUTATION_ATTRIBUTION_V1_2026-07-21.md'
      - '.github/workflows/nav-v2-index-query-plan-harness-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-index-query-plan-candidate-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-evidence-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-attribution-v1.json'
      - 'config/nav-v2-performance-advisor-attestation-v1.json'
      - 'tests/sql/nav_v2_index_query_plan_harness_v1.sql'
      - 'tests/sql/nav_v2_index_fk_parent_mutation_harness_v1.sql'
      - 'tests/sql/nav_v2_index_fk_parent_mutation_attribution_harness_v1.sql'
      - 'scripts/check_nav_v2_index_query_plan_candidate_v1.py'
      - 'scripts/check_nav_v2_index_fk_parent_mutation_evidence_v1.py'
      - 'scripts/check_nav_v2_index_fk_parent_mutation_attribution_v1.py'
      - 'docs/NAV_V2_INDEX_QUERY_PLAN_CANDIDATE_V1_2026-07-21.md'
      - 'docs/NAV_V2_INDEX_FK_PARENT_MUTATION_EVIDENCE_V1_2026-07-21.md'
      - 'docs/NAV_V2_INDEX_FK_PARENT_MUTATION_ATTRIBUTION_V1_2026-07-21.md'
      - '.github/workflows/nav-v2-index-query-plan-harness-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Validate candidate JSON
        run: |
          python3 -m json.tool config/nav-v2-index-query-plan-candidate-v1.json > /dev/null
          python3 -m json.tool config/nav-v2-index-fk-parent-mutation-evidence-v1.json > /dev/null
          python3 -m json.tool config/nav-v2-index-fk-parent-mutation-attribution-v1.json > /dev/null

      - name: Compile candidate validators
        run: |
          python3 -m py_compile scripts/check_nav_v2_index_query_plan_candidate_v1.py
          python3 -m py_compile scripts/check_nav_v2_index_fk_parent_mutation_evidence_v1.py
          python3 -m py_compile scripts/check_nav_v2_index_fk_parent_mutation_attribution_v1.py

      - name: Check index query-plan source contract
        run: python3 scripts/check_nav_v2_index_query_plan_candidate_v1.py

      - name: Check FK parent mutation evidence contract
        run: python3 scripts/check_nav_v2_index_fk_parent_mutation_evidence_v1.py

      - name: Check FK parent mutation attribution contract
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/check_nav_v2_index_fk_parent_mutation_attribution_v1.py 2>&1 \
            | tee /tmp/nav-v2-index-fk-parent-mutation-attribution-source.log

      - name: Upload attribution source diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-index-fk-parent-mutation-attribution-source
          path: /tmp/nav-v2-index-fk-parent-mutation-attribution-source.log
          if-no-files-found: warn
          retention-days: 14

  postgres-17-query-plan:
    needs: source-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_index_plan
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_index_plan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_index_plan
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run synthetic query-plan and rollback harness
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_index_query_plan_harness_v1.sql \
            | tee /tmp/nav-v2-index-query-plan-harness-v1.log

      - name: Upload synthetic query-plan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-index-query-plan-harness-v1
          path: /tmp/nav-v2-index-query-plan-harness-v1.log
          if-no-files-found: warn
          retention-days: 30

  postgres-17-fk-parent-mutation:
    needs: source-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_fk_parent_mutation
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_fk_parent_mutation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_fk_parent_mutation
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run synthetic FK parent mutation and rollback harness
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_index_fk_parent_mutation_harness_v1.sql \
            | tee /tmp/nav-v2-index-fk-parent-mutation-harness-v1.log

      - name: Upload synthetic FK parent mutation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-index-fk-parent-mutation-harness-v1
          path: /tmp/nav-v2-index-fk-parent-mutation-harness-v1.log
          if-no-files-found: warn
          retention-days: 30

  postgres-17-fk-parent-mutation-attribution:
    needs: source-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_fk_parent_attribution
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_fk_parent_attribution"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_fk_parent_attribution
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run synthetic FK parent mutation attribution and rollback harness
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_index_fk_parent_mutation_attribution_harness_v1.sql \
            2>&1 | tee /tmp/nav-v2-index-fk-parent-mutation-attribution-v1.log

      - name: Upload synthetic FK mutation attribution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-index-fk-parent-mutation-attribution-v1
          path: /tmp/nav-v2-index-fk-parent-mutation-attribution-v1.log
          if-no-files-found: warn
          retention-days: 30
