name: Navigator v2 legal passport preview

on:
  pull_request:
    paths:
      - 'deal-card-v2.html'
      - 'assets/css/nav-v2-legal-passport.css'
      - 'assets/js/nav-v2/deal-card-legal-passport-*.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check-nav-v2-legal-passport-preview.mjs'
      - 'scripts/check_nav_v2_legal_passport_preview.py'
      - 'scripts/check_nav_v2_deal_card_hooks.py'
      - 'tests/fixtures/nav-v2-legal-passport-preview.html'
      - 'tests/e2e/legal-passport-preview.spec.js'
      - '.github/workflows/nav-v2-legal-passport-preview.yml'
  push:
    branches:
      - main
    paths:
      - 'deal-card-v2.html'
      - 'assets/css/nav-v2-legal-passport.css'
      - 'assets/js/nav-v2/deal-card-legal-passport-*.js'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'scripts/check-nav-v2-legal-passport-preview.mjs'
      - 'scripts/check_nav_v2_legal_passport_preview.py'
      - 'scripts/check_nav_v2_deal_card_hooks.py'
      - 'tests/fixtures/nav-v2-legal-passport-preview.html'
      - 'tests/e2e/legal-passport-preview.spec.js'
      - '.github/workflows/nav-v2-legal-passport-preview.yml'

permissions:
  contents: read

jobs:
  semantic-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Source and semantic preview
        run: |
          python3 scripts/check_nav_v2_legal_passport_preview.py
          node scripts/check-nav-v2-legal-passport-preview.mjs
          python3 scripts/check_nav_v2_deal_card_hooks.py
      - name: Syntax checks
        run: |
          node --check assets/js/nav-v2/deal-card-legal-passport-model-v1.js
          node --check assets/js/nav-v2/deal-card-legal-passport-v1.js
          node --check tests/e2e/legal-passport-preview.spec.js
          python3 -m py_compile scripts/check_nav_v2_legal_passport_preview.py

  public-browser:
    needs: semantic-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Desktop and mobile legal passport preview
        run: npx playwright test tests/e2e/legal-passport-preview.spec.js --project=chromium-desktop --project=chromium-mobile
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-legal-passport-preview
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
