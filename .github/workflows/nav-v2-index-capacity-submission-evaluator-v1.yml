name: Navigator v2 index capacity submission evaluator v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-index-capacity-input-decision-v1.json'
      - 'config/nav-v2-index-capacity-submission-evaluator-v1.json'
      - 'scripts/evaluate_nav_v2_index_capacity_submission_v1.py'
      - 'scripts/check_nav_v2_index_capacity_submission_evaluator_v1.py'
      - 'docs/NAV_V2_INDEX_CAPACITY_SUBMISSION_EVALUATOR_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-index-capacity-submission-evaluator-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-index-capacity-input-decision-v1.json'
      - 'config/nav-v2-index-capacity-submission-evaluator-v1.json'
      - 'scripts/evaluate_nav_v2_index_capacity_submission_v1.py'
      - 'scripts/check_nav_v2_index_capacity_submission_evaluator_v1.py'
      - 'docs/NAV_V2_INDEX_CAPACITY_SUBMISSION_EVALUATOR_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-index-capacity-submission-evaluator-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-capacity-submission-evaluator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate canonical and evaluator contracts
        run: |
          python3 -m json.tool config/nav-v2-index-capacity-input-decision-v1.json > /dev/null
          python3 -m json.tool config/nav-v2-index-capacity-submission-evaluator-v1.json > /dev/null

      - name: Compile evaluator and checker
        run: |
          python3 -m py_compile scripts/evaluate_nav_v2_index_capacity_submission_v1.py
          python3 -m py_compile scripts/check_nav_v2_index_capacity_submission_evaluator_v1.py

      - name: Run thirteen-case offline evaluator self-test
        run: python3 scripts/check_nav_v2_index_capacity_submission_evaluator_v1.py
