name: Navigator v2 consultation lifecycle

on:
  pull_request:
    paths:
      - 'config/nav-v2-consultation-lifecycle-contract.json'
      - 'fixtures/nav-v2-consultation-lifecycle-scenarios.json'
      - 'supabase/prototypes/nav_v2_consultation_lifecycle.sql'
      - 'docs/NAV_V2_CONSULTATION_LIFECYCLE_PROTOTYPE_2026-07-16.md'
      - 'scripts/check_nav_v2_consultation_lifecycle.py'
      - '.github/workflows/nav-v2-consultation-lifecycle.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consultation-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate consultation lifecycle contract
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/check_nav_v2_consultation_lifecycle.py 2>&1 | tee consultation-contract-output.txt
      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_consultation_lifecycle.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-consultation-lifecycle
          path: |
            consultation-contract-output.txt
            config/nav-v2-consultation-lifecycle-contract.json
            fixtures/nav-v2-consultation-lifecycle-scenarios.json
            supabase/prototypes/nav_v2_consultation_lifecycle.sql
            docs/NAV_V2_CONSULTATION_LIFECYCLE_PROTOTYPE_2026-07-16.md
          if-no-files-found: error
