name: Navigator v2 bounded task actor-aware SQL

on:
  pull_request:
    paths:
      - 'config/nav-v2-bounded-task-actor-aware-contract.json'
      - 'supabase/prototypes/nav_v2_bounded_task_contract.sql'
      - 'supabase/prototypes/nav_v2_bounded_task_mutations.sql'
      - 'supabase/prototypes/nav_v2_bounded_task_actor_aware_mutations.sql'
      - 'supabase/functions/nav-v2-deal-api/task-action-edge-identity-v2.js'
      - 'supabase/functions/nav-v2-deal-api/index.ts'
      - 'tests/sql/nav_v2_bounded_task_mutation_setup.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_mutation_assertions_part*.sql'
      - 'tests/sql/nav_v2_bounded_task_actor_aware_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_actor_aware_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_actor_aware_rollback_assertions.sql'
      - 'scripts/check_nav_v2_bounded_task_actor_aware.py'
      - 'docs/NAV_V2_BOUNDED_TASK_ACTOR_AWARE_SQL_2026-07-17.md'
      - '.github/workflows/nav-v2-bounded-task-actor-aware.yml'
  push:
    branches:
      - main
    paths:
      - 'config/nav-v2-bounded-task-actor-aware-contract.json'
      - 'supabase/prototypes/nav_v2_bounded_task_actor_aware_mutations.sql'
      - 'tests/sql/nav_v2_bounded_task_actor_aware_assertions.sql'
      - 'tests/sql/nav_v2_bounded_task_actor_aware_rollback.sql'
      - 'tests/sql/nav_v2_bounded_task_actor_aware_rollback_assertions.sql'
      - 'scripts/check_nav_v2_bounded_task_actor_aware.py'
      - 'docs/NAV_V2_BOUNDED_TASK_ACTOR_AWARE_SQL_2026-07-17.md'
      - '.github/workflows/nav-v2-bounded-task-actor-aware.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actor-aware-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate actor-aware source contract
        run: python3 scripts/check_nav_v2_bounded_task_actor_aware.py
      - name: Compile actor-aware checker
        run: python3 -m py_compile scripts/check_nav_v2_bounded_task_actor_aware.py

  postgres-17-actor-aware-lifecycle:
    needs: actor-aware-static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: navigator_actor_aware_bounded
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d navigator_actor_aware_bounded"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: navigator_actor_aware_bounded
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL 17
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Create synthetic Auth, roles, deals and legacy task
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_setup.sql
      - name: Apply bounded task base contract
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_contract.sql
      - name: Apply canonical governed mutations
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_mutations.sql
      - name: Apply actor-aware service-role overloads
        run: psql -v ON_ERROR_STOP=1 -f supabase/prototypes/nav_v2_bounded_task_actor_aware_mutations.sql
      - name: Preserve canonical role, lifecycle, evidence and separation regression
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_mutation_assertions.sql 2>&1 | tee actor-aware-canonical-regression.log
      - name: Run actor-aware lifecycle, replay, audit and claim assertions
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_actor_aware_assertions.sql 2>&1 | tee actor-aware-lifecycle.log
      - name: Rehearse actor-aware overlay rollback
        run: psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_actor_aware_rollback.sql
      - name: Assert canonical lifecycle and data survive overlay rollback
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f tests/sql/nav_v2_bounded_task_actor_aware_rollback_assertions.sql 2>&1 | tee actor-aware-rollback.log
      - name: Upload actor-aware evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-bounded-task-actor-aware
          path: |
            config/nav-v2-bounded-task-actor-aware-contract.json
            supabase/prototypes/nav_v2_bounded_task_actor_aware_mutations.sql
            tests/sql/nav_v2_bounded_task_actor_aware_assertions.sql
            tests/sql/nav_v2_bounded_task_actor_aware_rollback.sql
            tests/sql/nav_v2_bounded_task_actor_aware_rollback_assertions.sql
            docs/NAV_V2_BOUNDED_TASK_ACTOR_AWARE_SQL_2026-07-17.md
            actor-aware-canonical-regression.log
            actor-aware-lifecycle.log
            actor-aware-rollback.log
          if-no-files-found: error
          retention-days: 14
