name: Navigator v2 Auth password reset tests v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-auth-password-reset-tests-v1.json'
      - 'assets/js/nav-v2/supabase-v2.js'
      - 'tests/unit/nav-v2-auth-session-recovery.test.mjs'
      - 'tests/unit/nav-v2-auth-concurrent-refresh.test.mjs'
      - 'tests/unit/nav-v2-auth-network-no-lock.test.mjs'
      - 'tests/unit/nav-v2-auth-lock-timeout-post-refresh.test.mjs'
      - 'tests/unit/nav-v2-auth-storage-signin-race.test.mjs'
      - 'tests/unit/nav-v2-auth-logout-storage-failure.test.mjs'
      - 'tests/unit/nav-v2-auth-password-reset.test.mjs'
      - 'scripts/check_nav_v2_auth_password_reset_tests_v1.py'
      - 'docs/NAV_V2_AUTH_PASSWORD_RESET_TESTS_V1_2026-07-23.md'
      - '.github/workflows/nav-v2-auth-password-reset-tests-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-auth-password-reset-tests-v1.json'
      - 'assets/js/nav-v2/supabase-v2.js'
      - 'tests/unit/nav-v2-auth-session-recovery.test.mjs'
      - 'tests/unit/nav-v2-auth-concurrent-refresh.test.mjs'
      - 'tests/unit/nav-v2-auth-network-no-lock.test.mjs'
      - 'tests/unit/nav-v2-auth-lock-timeout-post-refresh.test.mjs'
      - 'tests/unit/nav-v2-auth-storage-signin-race.test.mjs'
      - 'tests/unit/nav-v2-auth-logout-storage-failure.test.mjs'
      - 'tests/unit/nav-v2-auth-password-reset.test.mjs'
      - 'scripts/check_nav_v2_auth_password_reset_tests_v1.py'
      - 'docs/NAV_V2_AUTH_PASSWORD_RESET_TESTS_V1_2026-07-23.md'
      - '.github/workflows/nav-v2-auth-password-reset-tests-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-password-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate contract JSON
        run: python3 -m json.tool config/nav-v2-auth-password-reset-tests-v1.json > /dev/null

      - name: Compile source checker
        run: python3 -m py_compile scripts/check_nav_v2_auth_password_reset_tests_v1.py

      - name: Validate offline-only source boundary
        run: python3 scripts/check_nav_v2_auth_password_reset_tests_v1.py

      - name: Run existing Auth recovery suite
        run: node tests/unit/nav-v2-auth-session-recovery.test.mjs

      - name: Run existing concurrent refresh suite
        run: node tests/unit/nav-v2-auth-concurrent-refresh.test.mjs

      - name: Run existing network and no-lock suite
        run: node tests/unit/nav-v2-auth-network-no-lock.test.mjs

      - name: Run existing lock timeout and post-refresh suite
        run: node tests/unit/nav-v2-auth-lock-timeout-post-refresh.test.mjs

      - name: Run existing storage and sign-in race suite
        run: node tests/unit/nav-v2-auth-storage-signin-race.test.mjs

      - name: Run existing logout and storage failure suite
        run: node tests/unit/nav-v2-auth-logout-storage-failure.test.mjs

      - name: Run password reset suite
        run: node tests/unit/nav-v2-auth-password-reset.test.mjs
