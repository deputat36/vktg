name: Navigator v2 task role matrix rehearsal

on:
  pull_request:
    paths:
      - 'config/nav-v2-task-role-matrix-rehearsal.json'
      - 'config/nav-v2-e2e-target-plan.json'
      - 'assets/js/nav-v2/task-action-guard-v2.js'
      - 'assets/js/nav-v2/task-action-router-v2.js'
      - 'tests/fixtures/nav-v2-task-role-matrix-rehearsal.html'
      - 'tests/e2e/task-action-role-matrix-rehearsal.spec.js'
      - 'scripts/check_nav_v2_task_role_matrix_rehearsal.py'
      - 'docs/NAV_V2_TASK_ROLE_MATRIX_REHEARSAL_2026-07-17.md'
      - '.github/workflows/nav-v2-task-role-matrix-rehearsal.yml'
  push:
    branches:
      - main
    paths:
      - 'config/nav-v2-task-role-matrix-rehearsal.json'
      - 'config/nav-v2-e2e-target-plan.json'
      - 'assets/js/nav-v2/task-action-guard-v2.js'
      - 'assets/js/nav-v2/task-action-router-v2.js'
      - 'tests/fixtures/nav-v2-task-role-matrix-rehearsal.html'
      - 'tests/e2e/task-action-role-matrix-rehearsal.spec.js'
      - 'scripts/check_nav_v2_task_role_matrix_rehearsal.py'
      - 'docs/NAV_V2_TASK_ROLE_MATRIX_REHEARSAL_2026-07-17.md'
      - '.github/workflows/nav-v2-task-role-matrix-rehearsal.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semantic-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate role matrix source contract
        run: python3 scripts/check_nav_v2_task_role_matrix_rehearsal.py
      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_task_role_matrix_rehearsal.py
      - name: Check JavaScript syntax
        run: |
          node --check assets/js/nav-v2/task-action-guard-v2.js
          node --check assets/js/nav-v2/task-action-router-v2.js
          node --check tests/e2e/task-action-role-matrix-rehearsal.spec.js

  browser-rehearsal:
    needs: semantic-static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run cost-free desktop and mobile task role matrix
        run: npx playwright test tests/e2e/task-action-role-matrix-rehearsal.spec.js --project=chromium-desktop --project=chromium-mobile
      - name: Upload role matrix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-task-role-matrix-rehearsal
          path: |
            playwright-report/
            test-results/
            config/nav-v2-task-role-matrix-rehearsal.json
            docs/NAV_V2_TASK_ROLE_MATRIX_REHEARSAL_2026-07-17.md
          if-no-files-found: error
          retention-days: 14
