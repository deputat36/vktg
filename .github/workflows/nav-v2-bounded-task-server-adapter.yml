name: Navigator v2 bounded task server adapter

on:
  pull_request:
    paths:
      - 'assets/js/nav-v2/bounded-task-server-adapter-v2.js'
      - 'fixtures/nav-v2-bounded-task-server-adapter-scenarios.json'
      - 'scripts/check-nav-v2-bounded-task-server-adapter.mjs'
      - 'scripts/check_nav_v2_bounded_task_server_adapter.py'
      - 'config/nav-v2-bounded-task-mutations-contract.json'
      - 'supabase/prototypes/nav_v2_bounded_task_mutations.sql'
      - 'docs/NAV_V2_BOUNDED_TASK_SERVER_ADAPTER_2026-07-16.md'
      - '.github/workflows/nav-v2-bounded-task-server-adapter.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bounded-task-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate source contract
        run: python3 scripts/check_nav_v2_bounded_task_server_adapter.py
      - name: Run semantic regression
        run: node scripts/check-nav-v2-bounded-task-server-adapter.mjs
      - name: Check JavaScript syntax
        run: node --check assets/js/nav-v2/bounded-task-server-adapter-v2.js
      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_bounded_task_server_adapter.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-bounded-task-server-adapter
          path: |
            assets/js/nav-v2/bounded-task-server-adapter-v2.js
            fixtures/nav-v2-bounded-task-server-adapter-scenarios.json
            docs/NAV_V2_BOUNDED_TASK_SERVER_ADAPTER_2026-07-16.md
          if-no-files-found: error
