name: Navigator v2 production-scale FK benchmark plan v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-production-scale-fk-benchmark-plan-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-evidence-v1.json'
      - 'config/nav-v2-index-write-storage-measurement-v1.json'
      - 'config/nav-v2-query-to-index-mapping-v1.json'
      - 'tests/sql/nav_v2_production_scale_fk_benchmark_readonly_preflight_v1.sql'
      - 'scripts/check_nav_v2_production_scale_fk_benchmark_plan_v1.py'
      - 'docs/NAV_V2_PRODUCTION_SCALE_FK_BENCHMARK_PLAN_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-production-scale-fk-benchmark-plan-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-production-scale-fk-benchmark-plan-v1.json'
      - 'config/nav-v2-index-fk-parent-mutation-evidence-v1.json'
      - 'config/nav-v2-index-write-storage-measurement-v1.json'
      - 'config/nav-v2-query-to-index-mapping-v1.json'
      - 'tests/sql/nav_v2_production_scale_fk_benchmark_readonly_preflight_v1.sql'
      - 'scripts/check_nav_v2_production_scale_fk_benchmark_plan_v1.py'
      - 'docs/NAV_V2_PRODUCTION_SCALE_FK_BENCHMARK_PLAN_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-production-scale-fk-benchmark-plan-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-contract-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate plan JSON
        run: python3 -m json.tool config/nav-v2-production-scale-fk-benchmark-plan-v1.json > /dev/null

      - name: Compile plan validator
        run: python3 -m py_compile scripts/check_nav_v2_production_scale_fk_benchmark_plan_v1.py

      - name: Validate fail-closed benchmark plan
        run: python3 scripts/check_nav_v2_production_scale_fk_benchmark_plan_v1.py
