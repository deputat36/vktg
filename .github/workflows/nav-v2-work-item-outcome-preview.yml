name: Navigator v2 work-item outcome preview

on:
  pull_request:
    paths:
      - 'deal-card-v2.html'
      - 'assets/css/nav-v2-outcome-preview.css'
      - 'assets/js/nav-v2/deal-card-recheck-alert-v2.js'
      - 'assets/js/nav-v2/work-item-outcome-model-v2.js'
      - 'assets/js/nav-v2/work-item-outcome-preview-v2.js'
      - 'config/nav-v2-module-budget.json'
      - 'config/nav-v2-work-item-outcome-contract.json'
      - 'scripts/check-nav-v2-work-item-outcome-preview.mjs'
      - 'scripts/check_nav_v2_work_item_outcome_preview.py'
      - '.github/workflows/nav-v2-work-item-outcome-preview.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  outcome-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate source contract
        run: python3 scripts/check_nav_v2_work_item_outcome_preview.py
      - name: Run semantic regression
        run: node scripts/check-nav-v2-work-item-outcome-preview.mjs
      - name: Check JavaScript syntax
        run: |
          node --check assets/js/nav-v2/work-item-outcome-model-v2.js
          node --check assets/js/nav-v2/work-item-outcome-preview-v2.js
          node --check assets/js/nav-v2/deal-card-recheck-alert-v2.js
      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_work_item_outcome_preview.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-work-item-outcome-preview
          path: |
            assets/js/nav-v2/work-item-outcome-model-v2.js
            assets/js/nav-v2/work-item-outcome-preview-v2.js
            assets/css/nav-v2-outcome-preview.css
            scripts/check-nav-v2-work-item-outcome-preview.mjs
          if-no-files-found: error
