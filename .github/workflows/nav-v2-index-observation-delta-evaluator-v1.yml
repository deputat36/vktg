name: Navigator v2 index observation delta evaluator v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-index-observation-delta-evaluator-v1.json'
      - 'config/nav-v2-index-observation-window-v1.json'
      - 'config/nav-v2-index-capacity-input-decision-v1.json'
      - 'scripts/evaluate_nav_v2_index_observation_delta_v1.py'
      - 'scripts/check_nav_v2_index_observation_delta_evaluator_v1.py'
      - 'docs/NAV_V2_INDEX_OBSERVATION_DELTA_EVALUATOR_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-index-observation-delta-evaluator-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-index-observation-delta-evaluator-v1.json'
      - 'config/nav-v2-index-observation-window-v1.json'
      - 'config/nav-v2-index-capacity-input-decision-v1.json'
      - 'scripts/evaluate_nav_v2_index_observation_delta_v1.py'
      - 'scripts/check_nav_v2_index_observation_delta_evaluator_v1.py'
      - 'docs/NAV_V2_INDEX_OBSERVATION_DELTA_EVALUATOR_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-index-observation-delta-evaluator-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-contract-and-self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate evaluator JSON
        run: python3 -m json.tool config/nav-v2-index-observation-delta-evaluator-v1.json > /dev/null

      - name: Compile evaluator and checker
        run: |
          python3 -m py_compile scripts/evaluate_nav_v2_index_observation_delta_v1.py
          python3 -m py_compile scripts/check_nav_v2_index_observation_delta_evaluator_v1.py

      - name: Validate offline evaluator source contract
        run: python3 scripts/check_nav_v2_index_observation_delta_evaluator_v1.py

      - name: Run offline evaluator self-test matrix
        run: python3 scripts/evaluate_nav_v2_index_observation_delta_v1.py --self-test
