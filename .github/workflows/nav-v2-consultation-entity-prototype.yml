name: Navigator v2 consultation entity prototype

on:
  pull_request:
    paths:
      - 'supabase/prototypes/nav_v2_consultation_entity.sql'
      - 'config/nav-v2-consultation-entity-contract.json'
      - 'fixtures/nav-v2-consultation-entity-scenarios.json'
      - 'scripts/check_nav_v2_consultation_entity_prototype.py'
      - 'scripts/check_nav_v2_consultation_entity_scenarios.py'
      - 'docs/NAV_V2_CONSULTATION_ENTITY_PROTOTYPE_2026-07-16.md'
      - 'docs/NAV_V2_WORK_HANDOFF_LATEST.md'
      - '.github/workflows/nav-v2-consultation-entity-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consultation-entity-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate source and DTO contract
        run: python3 scripts/check_nav_v2_consultation_entity_prototype.py
      - name: Run lifecycle and access scenarios
        run: python3 scripts/check_nav_v2_consultation_entity_scenarios.py
      - name: Compile Python checkers
        run: |
          python3 -m py_compile scripts/check_nav_v2_consultation_entity_prototype.py
          python3 -m py_compile scripts/check_nav_v2_consultation_entity_scenarios.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-consultation-entity-prototype
          path: |
            supabase/prototypes/nav_v2_consultation_entity.sql
            config/nav-v2-consultation-entity-contract.json
            fixtures/nav-v2-consultation-entity-scenarios.json
            docs/NAV_V2_CONSULTATION_ENTITY_PROTOTYPE_2026-07-16.md
          if-no-files-found: error
