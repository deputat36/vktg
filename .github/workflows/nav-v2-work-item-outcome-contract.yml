name: Navigator v2 work-item outcome contract

on:
  pull_request:
    paths:
      - 'config/nav-v2-work-item-outcome-contract.json'
      - 'supabase/prototypes/nav_v2_work_item_outcomes.sql'
      - 'docs/NAV_V2_WORK_ITEM_OUTCOME_CONTRACT_2026-07-16.md'
      - 'scripts/check_nav_v2_work_item_outcome_contract.py'
      - '.github/workflows/nav-v2-work-item-outcome-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  outcome-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate work-item outcome contract
        run: python3 scripts/check_nav_v2_work_item_outcome_contract.py
      - name: Compile checker
        run: python3 -m py_compile scripts/check_nav_v2_work_item_outcome_contract.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-v2-work-item-outcome-contract
          path: |
            config/nav-v2-work-item-outcome-contract.json
            supabase/prototypes/nav_v2_work_item_outcomes.sql
            docs/NAV_V2_WORK_ITEM_OUTCOME_CONTRACT_2026-07-16.md
          if-no-files-found: error
