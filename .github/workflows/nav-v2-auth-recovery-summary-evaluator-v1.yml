name: Navigator v2 redacted Auth recovery summary evaluator v1

on:
  pull_request:
    paths:
      - 'config/nav-v2-auth-recovery-summary-evaluator-v1.json'
      - 'scripts/evaluate_nav_v2_auth_recovery_summary_v1.py'
      - 'scripts/check_nav_v2_auth_recovery_summary_evaluator_v1.py'
      - 'docs/NAV_V2_AUTH_RECOVERY_SUMMARY_EVALUATOR_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-auth-recovery-summary-evaluator-v1.yml'
  push:
    branches: [main]
    paths:
      - 'config/nav-v2-auth-recovery-summary-evaluator-v1.json'
      - 'scripts/evaluate_nav_v2_auth_recovery_summary_v1.py'
      - 'scripts/check_nav_v2_auth_recovery_summary_evaluator_v1.py'
      - 'docs/NAV_V2_AUTH_RECOVERY_SUMMARY_EVALUATOR_V1_2026-07-22.md'
      - '.github/workflows/nav-v2-auth-recovery-summary-evaluator-v1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-redacted-summary-evaluator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate contract JSON
        run: python3 -m json.tool config/nav-v2-auth-recovery-summary-evaluator-v1.json > /dev/null

      - name: Compile evaluator and checker
        run: |
          python3 -m py_compile scripts/evaluate_nav_v2_auth_recovery_summary_v1.py
          python3 -m py_compile scripts/check_nav_v2_auth_recovery_summary_evaluator_v1.py

      - name: Run seven-case offline evaluator self-test
        run: python3 scripts/check_nav_v2_auth_recovery_summary_evaluator_v1.py
