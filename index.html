<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM Навигатор сделок v2</title>
  <meta name="description" content="CRM Навигатор сделок v2">
  <script>
    (function () {
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var authPayload = (search + hash).indexOf('access_token=') !== -1
        || (search + hash).indexOf('refresh_token=') !== -1
        || (search + hash).indexOf('token_hash=') !== -1
        || (search + hash).indexOf('token=') !== -1
        || (search + hash).indexOf('type=recovery') !== -1
        || (search + hash).indexOf('type=invite') !== -1;
      var page = authPayload ? 'nav-accept-invite-v2.html' : 'nav-v2.html';
      window.location.replace('./' + page + search + hash);
    })();
  </script>
</head>
<body>
  <p>Открываю CRM Навигатор сделок...</p>
  <p><a href="./nav-v2.html">Перейти ко входу</a></p>
</body>
</html>
