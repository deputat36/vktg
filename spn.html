<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>СПН — простой мастер сделки</title>
  <link rel="stylesheet" href="./assets/css/spn-workbench.css">
</head>
<body>
  <div class="spn-shell">
    <header class="spn-header">
      <div>
        <div class="spn-kicker">Этажи · Борисоглебск</div>
        <h1>Простой мастер сделки</h1>
        <p>Один вопрос на экране. Никаких режимов, дублей, боковых блоков и технического мусора.</p>
      </div>
      <div class="spn-header-actions">
        <a href="./deals.html">Мои сделки</a>
        <a href="./index.html">Расширенный режим</a>
      </div>
    </header>

    <div id="spnStatus" class="spn-status warn">Проверяю вход...</div>

    <main class="spn-master">
      <section class="spn-progress-card">
        <div class="spn-progress-top">
          <span id="questionCounter">Вопрос 1 из 1</span>
          <strong id="progressPercent">0%</strong>
        </div>
        <div class="spn-progress-line"><span id="progressBar"></span></div>
        <div id="progressDots" class="spn-dots"></div>
      </section>

      <section id="questionCard" class="spn-question-card">
        <div class="spn-question-meta" id="questionMeta">Сделка</div>
        <h2 id="questionTitle">Вопрос</h2>
        <p id="questionHint">Подсказка</p>
        <div id="questionBody" class="spn-question-body"></div>
        <div id="questionHelp" class="spn-help-box"></div>
      </section>

      <section class="spn-actions-bar">
        <button id="btnBack" type="button" class="spn-btn light">Назад</button>
        <button id="btnSkip" type="button" class="spn-btn light">Пропустить</button>
        <button id="btnNext" type="button" class="spn-btn primary">Далее</button>
      </section>

      <section id="finalCard" class="spn-final-card" style="display:none">
        <h2>Карточка готова к проверке</h2>
        <div id="finalSummary" class="spn-final-grid"></div>
        <div id="finalIssues" class="spn-final-issues"></div>
        <div class="spn-final-actions">
          <button id="btnEdit" type="button" class="spn-btn light">Вернуться к вопросам</button>
          <button id="btnSave" type="button" class="spn-btn success">Сохранить в CRM</button>
          <button id="btnClear" type="button" class="spn-btn danger">Очистить черновик</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/js/pages/spn.js"></script>
</body>
</html>
